name: AutoHeal CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: autoheal-ci/package-lock.json
      - name: Install dependencies
        run: |
          cd autoheal-ci
          npm ci
      - name: Build Dashboard
        run: |
          cd autoheal-ci
          npm run build

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: autoheal-backend/requirements.txt
      - name: Install dependencies
        run: |
          cd autoheal-backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Smoke Test (Server Startup)
        env:
          GEMINI_API_KEY: "ci-dummy-key-for-smoke-test"
          JWT_SECRET_KEY: "ci-dummy-secret"
        run: |
          cd autoheal-backend
          # Start uvicorn and capture output
          python -m uvicorn main:app --port 8080 > server_output.log 2>&1 &
          SERVER_PID=$!
          
          # Wait for server to start
          sleep 10
          
          # Check if server is still running
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "Server started successfully!"
            kill $SERVER_PID
          else
            echo "Server failed to start. Logs:"
            cat server_output.log
            exit 1
          fi
